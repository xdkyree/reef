# SwiftLint configuration for Reef
# Rules must pass on: swiftlint lint --strict

# ── Inclusion / exclusion ────────────────────────────────────
included:
  - Reef
  - ReefTests

excluded:
  - Pods
  - DerivedData
  - build

# ── Rules that are errors (break CI) ────────────────────────
force_cast:
  severity: error

force_try:
  severity: error

# ── Length limits ────────────────────────────────────────────
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 50
  error: 80

type_body_length:
  warning: 250
  error: 400

# ── Naming ───────────────────────────────────────────────────
type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - db
    - url
    - url2

# ── Enabled opt-in rules ─────────────────────────────────────
opt_in_rules:
  - array_init
  - force_unwrapping
  - implicitly_unwrapped_optional
  - closure_spacing
  - collection_alignment
  - conditional_returns_on_newline
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - expiring_todo
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - optional_enum_case_matching
  - prefer_self_in_static_references
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - return_value_from_void_function
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - yoda_condition

# ── Disabled rules (intentional) ────────────────────────────
disabled_rules:
  - todo                     # tracked via expiring_todo instead
  - trailing_whitespace      # editor handles this

# ── Opt-in rule configuration ────────────────────────────────
force_unwrapping:
  severity: error

implicitly_unwrapped_optional:
  severity: error
  mode: all_except_iboutlets
